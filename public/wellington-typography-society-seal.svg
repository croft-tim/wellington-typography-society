<!--
  Blinking eyelid animation (SMIL).
  The upper eyelid is a filled shape whose lower control point sweeps from
  y=317 (open — nearly zero area) to y=364 (closed — covers full eye) and back.
  Two layers: solid capstone colour + matching hatch, so it blends seamlessly.
  Timing: 5s cycle — closes ~0.2s, holds ~0.25s, opens ~0.2s, rests ~4.35s.
-->
<path clip-path="url(#cc)" fill="#a09848" stroke="none">
  <animate attributeName="d"
    values="M 310,339 Q 340,316 370,339 Q 340,317 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,364 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,364 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,317 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,317 310,339 Z"
    keyTimes="0; 0.04; 0.09; 0.13; 1"
    dur="5s"
    repeatCount="indefinite"/>
</path>
<path clip-path="url(#cc)" fill="url(#lh)" stroke="none">
  <animate attributeName="d"
    values="M 310,339 Q 340,316 370,339 Q 340,317 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,364 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,364 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,317 310,339 Z;
            M 310,339 Q 340,316 370,339 Q 340,317 310,339 Z"
    keyTimes="0; 0.04; 0.09; 0.13; 1"
    dur="5s"
    repeatCount="indefinite"/>
</path>
<!-- Upper eyelid stroke redrawn on top -->
<path clip-path="url(#cc)" d="M 310,339 Q 340,316 370,339" fill="none" stroke="#1b3419" stroke-width="1.2"/>

<!-- Capstone outline on top of everything -->
<polygon points="340,308 295,370 385,370" fill="none" stroke="#1b3419" stroke-width="1.8"/>
</svg>
